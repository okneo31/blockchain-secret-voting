<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🗳️ 블록체인 비밀투표 대시보드</title>

<!-- OG / SNS 공유 (미들웨어가 언어별로 교체) -->
<meta property="og:type" content="website">

<meta property="og:description" content="누가 뽑았는지는 비밀, 표 검증은 누구나! 초등학생도 이해하는 블록체인 투표 대시보드.">

<meta name="twitter:title" content="🗳️ 블록체인 비밀투표 — 비밀은 지키고, 검증은 누구나">
<meta name="twitter:description" content="누가 뽑았는지는 비밀, 표 검증은 누구나! 초등학생도 이해하는 블록체인 투표 대시보드.">
<meta name="twitter:image" content="/og-ko.png">

<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#ffc98a;          /* 밝은 오렌지 바탕 */
    --ink:#3a2415;         /* 따뜻한 진갈색 잉크 */
    --ink2:#8a6f57;        /* 보조 글자 */
    --line:#ffb568;        /* 진한 오렌지 경계선 */
    --card:#ffe2ad;        /* 오렌지 카드 (흰색 완전 배제) */
    --secret:#ff4d8d;
    --verify:#10b8a6;
    --tamper:#3f78ff;
    --watch:#ff8a1e;
    --good:#22c55e;
    --bad:#ff5a5a;
    --shadow:0 8px 24px rgba(255,150,60,.16);
    --shadow-h:0 18px 44px rgba(255,120,40,.28);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    font-family:'Pretendard',sans-serif;
    background:
      radial-gradient(900px 480px at 6% -8%,#ffbf66 0%,transparent 60%),
      radial-gradient(820px 460px at 106% 2%,#ffae8a 0%,transparent 58%),
      radial-gradient(760px 520px at 50% 122%,#ffca7a 0%,transparent 62%),
      var(--bg);
    background-attachment:fixed;
    color:var(--ink);line-height:1.7;-webkit-font-smoothing:antialiased;
    letter-spacing:-.01em;padding:28px 20px 70px;
  }
  .wrap{max-width:1180px;margin:0 auto}

  /* ===== 언어 토글 (고정) ===== */
  .langtoggle{position:fixed;top:18px;right:18px;z-index:40;display:flex;
    background:var(--card);border:2px solid var(--watch);border-radius:999px;
    padding:4px;box-shadow:var(--shadow);font-weight:800;font-size:13.5px}
  .langtoggle button{border:none;background:none;cursor:pointer;padding:7px 15px;
    border-radius:999px;color:var(--ink2);font-weight:800;transition:.18s;font-family:inherit}
  .langtoggle button.act{background:var(--watch);color:#fff;box-shadow:0 4px 12px rgba(255,138,30,.4)}
  .langtoggle button:not(.act):hover{color:var(--watch)}

  /* ===== 등장 애니메이션 ===== */
  .reveal{opacity:0;transform:translateY(26px);transition:opacity .65s,transform .65s cubic-bezier(.2,.85,.25,1)}
  .reveal.in{opacity:1;transform:none}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
  @keyframes pop{0%{transform:scale(.6);opacity:0}60%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
  @keyframes rowIn{0%{transform:translateX(40px) scale(.96);opacity:0;background:#ffd98c}100%{transform:none;opacity:1}}

  /* ===== HEADER ===== */
  header{background:linear-gradient(135deg,#ffe7bd 0%,#ffd7c0 52%,#ffe3ad 100%);
    border:1px solid #ffc684;border-radius:28px;padding:40px 42px;box-shadow:var(--shadow);
    position:relative;overflow:hidden}
  header::after{content:"⛓️";position:absolute;right:34px;top:46px;font-size:84px;opacity:.18;
    animation:float 4s ease-in-out infinite}
  .kicker{font-size:14px;font-weight:800;color:var(--watch);letter-spacing:.04em}
  header h1{font-size:38px;font-weight:800;margin-top:10px;letter-spacing:-.03em;line-height:1.28;word-break:keep-all}
  header h1 .hl{background:linear-gradient(transparent 56%,#ffd060 56%,#ffb43a 100%);padding:0 4px;border-radius:3px;
    -webkit-box-decoration-break:clone;box-decoration-break:clone}
  header p{font-size:17px;color:var(--ink2);margin-top:14px;max-width:720px;font-weight:500}
  .tip{margin-top:18px;font-size:14px;color:#9a6a1f;font-weight:700;display:inline-flex;gap:8px;
    align-items:center;background:#ffdb9c;border:1px solid #ffbe6a;padding:9px 15px;border-radius:13px;
    animation:pulse 3s ease-in-out infinite}

  .pillars{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:24px}
  @media(max-width:820px){.pillars{grid-template-columns:repeat(2,1fr)}}
  .pillar{cursor:pointer;border:2px solid var(--line);border-radius:18px;padding:18px;
    background:var(--card);transition:.18s;text-align:left;position:relative}
  .pillar:hover{transform:translateY(-6px) scale(1.02);box-shadow:var(--shadow-h)}
  .pillar:active{transform:translateY(-1px) scale(.99)}
  .pillar .pe{font-size:30px;display:inline-block;transition:.3s}
  .pillar:hover .pe{transform:scale(1.25) rotate(-8deg)}
  .pillar .pt{font-weight:800;font-size:17px;margin-top:8px}
  .pillar .pd{font-size:13px;color:var(--ink2);margin-top:3px;font-weight:500}
  .pillar .more{font-size:12.5px;font-weight:800;margin-top:10px;display:inline-block}
  .pillar[data-key=secret]{border-color:#ffc9dd}.pillar[data-key=secret] .pt,.pillar[data-key=secret] .more{color:var(--secret)}
  .pillar[data-key=verify]{border-color:#bdeae3}.pillar[data-key=verify] .pt,.pillar[data-key=verify] .more{color:var(--verify)}
  .pillar[data-key=tamper]{border-color:#c6d8ff}.pillar[data-key=tamper] .pt,.pillar[data-key=tamper] .more{color:var(--tamper)}
  .pillar[data-key=watch]{border-color:#ffdca6}.pillar[data-key=watch] .pt,.pillar[data-key=watch] .more{color:var(--watch)}

  /* ===== SECTION ===== */
  section{margin-top:30px}
  .h{display:flex;align-items:baseline;gap:12px;margin-bottom:16px;padding-left:4px;flex-wrap:wrap}
  .h h2{font-size:23px;font-weight:800;letter-spacing:-.02em}
  .h span{font-size:14px;color:var(--ink2);font-weight:500}
  .card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:24px;box-shadow:var(--shadow)}
  .grid{display:grid;gap:16px}
  .g4{grid-template-columns:repeat(4,1fr)}.g2{grid-template-columns:1.25fr 1fr}
  @media(max-width:900px){.g4{grid-template-columns:repeat(2,1fr)}.g2{grid-template-columns:1fr}}

  .stat{cursor:pointer;transition:.18s}
  .stat:hover{transform:translateY(-5px);box-shadow:var(--shadow-h)}
  .stat .ic{font-size:24px}
  .stat .num{font-size:34px;font-weight:800;margin-top:4px;letter-spacing:-.02em}
  .stat .lbl{color:var(--ink2);font-size:14px;font-weight:600;margin-top:2px}
  .stat .hint{font-size:12px;font-weight:700;color:var(--watch);margin-top:10px}

  .flow{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
  @media(max-width:900px){.flow{grid-template-columns:repeat(2,1fr)}}
  .step{cursor:pointer;background:var(--card);border:1px solid var(--line);border-radius:16px;
    padding:18px 14px;text-align:center;transition:.18s}
  .step:hover{transform:translateY(-6px) rotate(-1deg);box-shadow:var(--shadow-h);border-color:#ffce93}
  .step .n{width:26px;height:26px;border-radius:50%;display:grid;place-items:center;margin:0 auto 8px;
    font-weight:800;font-size:13px;color:#fff;background:var(--watch)}
  .step .e{font-size:30px;transition:.3s}.step:hover .e{transform:scale(1.2)}
  .step .t{font-weight:800;margin-top:6px;font-size:15.5px}
  .step .d{color:var(--ink2);font-size:12.5px;margin-top:3px;font-weight:500}
  .step .tap{font-size:11.5px;color:var(--ink2);font-weight:700;margin-top:8px;opacity:.7}

  /* ===== 투표 시뮬레이터 ===== */
  .sim{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  @media(max-width:780px){.sim{grid-template-columns:1fr}}
  .votebox{display:flex;flex-direction:column;gap:12px}
  .candidate{display:flex;align-items:center;gap:14px;border:2px solid var(--line);border-radius:16px;
    padding:14px 16px;cursor:pointer;background:var(--card);transition:.16s;font-family:inherit;text-align:left;width:100%}
  .candidate:hover{transform:translateX(5px);box-shadow:var(--shadow)}
  .candidate:active{transform:scale(.98)}
  .candidate .ce{font-size:30px}
  .candidate .cn{font-weight:800;font-size:16px}
  .candidate .cc{font-size:12.5px;color:var(--ink2);font-weight:600}
  .candidate .cv{margin-left:auto;font-weight:800;font-size:20px}
  .simctrl{display:flex;gap:10px;margin-top:4px}
  .btn{border:none;cursor:pointer;font-family:inherit;font-weight:800;border-radius:12px;padding:11px 16px;font-size:14px;transition:.16s}
  .btn-reset{background:#ffd595;color:#8a5a12;border:1px solid #ffba66}
  .btn-reset:hover{background:#ffc97f}
  .simnote{font-size:13px;color:var(--ink2);font-weight:500;margin-top:6px;line-height:1.6}
  .procpanel{display:flex;flex-direction:column;gap:14px}
  .proctitle{font-weight:800;font-size:15px}
  .proc{list-style:none;position:relative}
  .proc::before{content:"";position:absolute;left:17px;top:14px;bottom:14px;width:3px;background:var(--line);border-radius:3px}
  .pstep{display:flex;align-items:center;gap:12px;padding:6px 0;position:relative;opacity:.45;transition:.3s}
  .pstep.active,.pstep.done{opacity:1}
  .ps-dot{width:36px;height:36px;border-radius:50%;display:grid;place-items:center;font-size:18px;
    background:var(--bg);border:2px solid var(--line);flex-shrink:0;z-index:1;transition:.3s}
  .pstep.active .ps-dot{transform:scale(1.18);border-color:var(--watch);box-shadow:0 0 0 6px rgba(255,138,30,.18)}
  .pstep.done .ps-dot{background:var(--watch);border-color:var(--watch)}
  .ps-t{font-weight:800;font-size:14px}
  .ps-v{font-size:12.5px;color:var(--ink2);font-weight:600;min-height:15px;transition:.2s}
  .ps-check{margin-left:auto;color:var(--good);font-weight:900;font-size:17px;opacity:0;transform:scale(.4);transition:.3s}
  .pstep.done .ps-check{opacity:1;transform:scale(1)}
  .ballotchip{margin-top:4px;background:#ffe6c2;border:1px dashed #ffbf6e;border-radius:14px;padding:14px;text-align:center}
  .ballotchip .bl{font-size:12.5px;color:var(--ink2);font-weight:700}
  .ballotchip .bn{font-family:'Consolas',monospace;font-size:24px;font-weight:800;color:var(--secret);margin-top:4px;letter-spacing:1px}
  .ballotchip .bs{font-size:12px;color:var(--ink2);margin-top:6px;font-weight:600}

  /* ===== TABLE ===== */
  table{width:100%;border-collapse:collapse;font-size:14.5px}
  th,td{padding:12px 14px;text-align:left;border-bottom:1px solid var(--line)}
  th{color:var(--ink2);font-size:12.5px;font-weight:700}
  tr:last-child td{border-bottom:none}
  tbody tr{cursor:pointer;transition:.12s}tbody tr:hover{background:#ffe2b8}
  tbody tr.new{animation:rowIn .55s cubic-bezier(.2,.85,.25,1)}
  .mono{font-family:'Consolas',monospace;color:var(--tamper);font-weight:600}
  .pill{padding:4px 11px;border-radius:999px;font-size:12.5px;font-weight:800;display:inline-block}
  .pl-lock{background:#ffd9a0;color:#b25e0a}.pl-ok{background:#ffd9a0;color:#1f7a44}.pl-secret{background:#ffd9a0;color:#c43370}

  .concept{cursor:pointer;display:flex;gap:14px;align-items:flex-start;padding:15px;border-radius:14px;
    border:1px solid var(--line);background:var(--card);margin-bottom:12px;transition:.16s}
  .concept:hover{background:#ffe2b8;transform:translateX(5px);border-color:#ffbf78}
  .concept .em{font-size:28px;flex-shrink:0}.concept b{font-size:15.5px}
  .concept p{color:var(--ink2);font-size:13.5px;margin-top:2px;font-weight:500}
  .concept .go{margin-left:auto;align-self:center;font-size:20px;color:var(--ink2)}

  .comp{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:640px){.comp{grid-template-columns:1fr}}
  .box{border-radius:16px;padding:18px;border:1px solid var(--line)}
  .box.bad{background:#ffd6bf;border-color:#ff9b80}.box.good{background:#ffe6b0;border-color:#ffbf66}
  .box h3{font-size:16px;margin-bottom:10px}.box ul{list-style:none}
  .box li{padding:5px 0;font-size:14px;display:flex;gap:8px;font-weight:500}
  .legend{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
  footer{text-align:center;color:var(--ink2);font-size:13px;margin-top:40px;font-weight:500}

  /* ===== MODAL ===== */
  .overlay{position:fixed;inset:0;background:rgba(60,35,15,.5);backdrop-filter:blur(3px);
    display:none;align-items:center;justify-content:center;padding:20px;z-index:60;opacity:0;transition:.2s}
  .overlay.on{display:flex;opacity:1}
  .modal{background:var(--card);border-radius:24px;max-width:560px;width:100%;max-height:88vh;overflow-y:auto;
    box-shadow:0 30px 80px rgba(60,35,15,.4);transform:translateY(16px) scale(.97);transition:.22s}
  .overlay.on .modal{transform:none}
  .modal .top{padding:26px 28px 18px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--card);border-radius:24px 24px 0 0}
  .modal .tag{font-size:13px;font-weight:800}
  .modal h3{font-size:25px;font-weight:800;margin-top:6px;letter-spacing:-.02em;line-height:1.3}
  .modal .lead{font-size:15px;color:var(--ink2);margin-top:8px;font-weight:500}
  .modal .body{padding:8px 28px 26px}
  .reason{display:flex;gap:14px;padding:16px 0;border-bottom:1px dashed var(--line)}
  .reason:last-child{border-bottom:none}
  .reason .rn{flex-shrink:0;width:30px;height:30px;border-radius:9px;display:grid;place-items:center;font-weight:800;color:#fff;font-size:15px}
  .reason .rt{font-weight:800;font-size:16px}
  .reason .rp{font-size:14.5px;color:var(--ink2);margin-top:3px;font-weight:500}
  .reason .ex{font-size:13.5px;margin-top:8px;background:#ffe1ab;border:1px solid #ffc679;padding:9px 12px;border-radius:11px;color:#7a5d1a;font-weight:600}
  .closebtn{position:absolute;top:22px;right:24px;width:34px;height:34px;border:none;cursor:pointer;
    background:#ffd595;border-radius:10px;font-size:18px;color:var(--ink);font-weight:700;transition:.15s}
  .closebtn:hover{background:#ffc77d;transform:rotate(90deg)}
  .kbd{font-size:12px;color:var(--ink2);text-align:center;padding:0 28px 22px;font-weight:600}

  /* ===== TOAST & CONFETTI ===== */
  .toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(24px);opacity:0;
    background:var(--ink);color:#fff;padding:13px 22px;border-radius:14px;font-weight:700;font-size:14.5px;
    z-index:70;transition:.3s cubic-bezier(.2,.85,.25,1);box-shadow:0 12px 30px rgba(0,0,0,.3);pointer-events:none}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
  .confetti{position:fixed;font-size:18px;pointer-events:none;z-index:65;animation:burst .9s ease-out forwards}
  @keyframes burst{to{transform:translate(var(--tx),var(--ty)) rotate(var(--r));opacity:0}}

  /* ===================== v3.0 ===================== */
  .leveltoggle{position:sticky;top:14px;z-index:41;display:flex;align-items:center;gap:6px;width:max-content;margin:0 auto 16px;
    background:var(--card);border:2px solid var(--watch);border-radius:999px;padding:4px 4px 4px 13px;
    box-shadow:var(--shadow);font-size:13px;font-weight:800}
  .leveltoggle .lvlbl{color:#b25e0a;font-size:12px;margin-right:2px}
  .leveltoggle button{border:none;background:none;cursor:pointer;padding:7px 13px;border-radius:999px;
    color:var(--ink2);font-weight:800;transition:.18s;font-family:inherit}
  .leveltoggle button.act{background:var(--watch);color:#fff;box-shadow:0 4px 12px rgba(255,138,30,.35)}
  .leveltoggle button:not(.act):hover{color:var(--watch)}
  @media(max-width:600px){.langtoggle{position:static;margin:0 auto 10px;justify-content:center}.leveltoggle{top:8px}}

  .depthnote{font-size:13px;font-weight:600;color:#8a5512;background:#ffdb9c;border:1px dashed #ffbe6a;
    border-radius:12px;padding:10px 13px;margin-top:14px;line-height:1.55}
  .feat-lead{color:var(--ink2);font-size:13.5px;font-weight:500;margin-bottom:14px}
  .wbtns{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
  .btn-go{background:var(--watch);color:#fff}.btn-go:hover{filter:brightness(1.06)}
  .btn-ghost{background:#ffe2ad;color:var(--ink);border:1px solid var(--line)}
  .verdict{margin-top:14px;font-weight:800;font-size:14.5px;padding:11px 14px;border-radius:12px}
  .verdict.ok{background:#e3f6ea;color:#1f7a44}.verdict.bad{background:#ffdada;color:#c0271f}

  /* tamper chain */
  .chain{display:flex;gap:10px;flex-wrap:wrap}
  .cblock{flex:1 1 120px;min-width:110px;border:2px solid var(--line);border-radius:14px;padding:12px;background:#ffe9c4;transition:.3s}
  .cblock .cb-n{font-weight:800;font-size:12.5px;color:var(--ink2)}
  .cblock .cb-v{font-size:26px;margin:4px 0}
  .cblock .cb-h{font-family:'Consolas',monospace;font-size:12px;color:var(--tamper);font-weight:700}
  .cblock .cb-link{font-size:11px;color:var(--ink2);margin-top:5px;font-weight:700}
  .cblock.broken{border-color:var(--bad);background:#ffdada;animation:shake .4s}
  .cblock.broken .cb-h,.cblock.broken .cb-link{color:var(--bad)}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

  /* threshold keys */
  .keys{display:grid;grid-template-columns:repeat(8,1fr);gap:8px}
  @media(max-width:560px){.keys{grid-template-columns:repeat(5,1fr)}}
  .keyb{aspect-ratio:1;border:2px solid var(--line);border-radius:12px;background:#ffe9c4;cursor:pointer;
    font-size:19px;display:grid;place-items:center;transition:.15s;font-family:inherit}
  .keyb.on{background:var(--watch);border-color:var(--watch);transform:scale(1.06)}
  .vault{margin-top:16px;text-align:center;padding:18px;border-radius:16px;border:2px dashed var(--line);transition:.3s}
  .vault.open{border-color:var(--good);background:#e3f6ea}
  .vault .ve{font-size:46px}.vault .vt{font-weight:800;margin-top:6px;font-size:15.5px}

  /* homomorphic */
  .homo{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:center;font-size:22px;font-weight:800;min-height:90px}
  .lockbox{border:2px solid var(--line);border-radius:14px;padding:10px 14px;background:#ffe9c4;min-width:64px;text-align:center}
  .lockbox .lbk{font-size:12px;color:var(--ink2);font-weight:700}
  .lockbox .lbn{font-size:22px;font-weight:800;margin-top:2px}
  .lockbox.sum{border-color:var(--verify);background:#d8f5f0}
  .lockbox.revealed{border-color:var(--good);background:#e3f6ea}

  /* nullifier */
  .idrow{display:flex;gap:12px;flex-wrap:wrap}
  .idcard{flex:1 1 200px;border:2px solid var(--line);border-radius:14px;padding:14px;background:#ffe9c4}
  .idcard .stamp{font-family:'Consolas',monospace;font-weight:800;color:var(--secret);margin-top:6px;font-size:15px}
  .idcard .res{font-weight:800;margin-top:8px;min-height:20px;font-size:13.5px}

  /* merkle */
  .merkle{width:100%;overflow-x:auto}
  .mrow{display:flex;justify-content:center;gap:6px;margin:7px 0;flex-wrap:nowrap}
  .mnode{padding:7px 9px;border:2px solid var(--line);border-radius:10px;background:#ffe9c4;
    font-family:'Consolas',monospace;font-size:11.5px;font-weight:700;cursor:default;transition:.2s;white-space:nowrap}
  .mnode.leaf{cursor:pointer}.mnode.leaf:hover{border-color:var(--watch)}
  .mnode.path{background:var(--watch);color:#fff;border-color:var(--watch)}
  .mnode.root{background:var(--tamper);color:#fff;border-color:var(--tamper)}

  /* verifier */
  .checks{display:flex;flex-direction:column;gap:8px}
  .chk{display:flex;align-items:center;gap:12px;border:1px solid var(--line);border-radius:12px;padding:12px;background:#ffe9c4;opacity:.5;transition:.35s}
  .chk.on{opacity:1;border-color:var(--good)}
  .chk .cbox{width:26px;height:26px;border-radius:7px;border:2px solid var(--line);display:grid;place-items:center;font-weight:900;color:#fff;flex-shrink:0;transition:.2s}
  .chk.on .cbox{background:var(--good);border-color:var(--good)}
  .chk .ct{font-weight:700;font-size:14px}

  /* on/off-chain */
  .oo{display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center}
  @media(max-width:640px){.oo{grid-template-columns:1fr}.ooarrow{transform:rotate(90deg)}}
  .oobox{border:2px solid var(--line);border-radius:16px;padding:16px;background:#ffe9c4;transition:.3s}
  .oobox h4{font-size:15px;margin-bottom:6px}.oobox p{font-size:12.5px;color:var(--ink2);font-weight:600}
  .oobox.mismatch{border-color:var(--bad);background:#ffdada}
  .ooarrow{font-size:22px;text-align:center;color:var(--ink2);font-weight:800}

  .credit{margin-top:10px;font-weight:800;color:var(--ink);font-size:13.5px}

  /* ===================== 모바일 최적화 ===================== */
  @media(max-width:640px){
    body{padding:14px 12px 50px;line-height:1.65}
    .wrap{max-width:100%}
    header{padding:24px 18px;border-radius:20px}
    header::after{font-size:50px;top:18px;right:14px;opacity:.12;animation:none}
    .kicker{font-size:12px}
    header h1{font-size:25px;line-height:1.32;margin-top:8px}
    header p{font-size:14px;margin-top:11px}
    .tip{font-size:12.5px;padding:8px 12px;margin-top:14px}
    .pillars{gap:10px;margin-top:18px}
    .pillar{padding:14px;border-radius:15px}
    .pillar .pe{font-size:26px}.pillar .pt{font-size:15.5px}
    section{margin-top:22px}
    .h{gap:8px;margin-bottom:12px}
    .h h2{font-size:18.5px}.h span{font-size:12.5px;flex-basis:100%}
    .card{padding:16px;border-radius:16px}
    .grid{gap:12px}
    .stat .num{font-size:27px}.stat .ic{font-size:21px}
    .flow{gap:9px}.step{padding:14px 10px}.step .e{font-size:26px}.step .t{font-size:14px}
    .sim{gap:14px}
    .candidate{padding:12px 13px}.candidate .ce{font-size:26px}.candidate .cn{font-size:15px}
    .proc::before{left:15px}.ps-dot{width:32px;height:32px;font-size:16px}
    table{font-size:13px}th,td{padding:9px 8px}
    .mono{font-size:11px}
    .keys{grid-template-columns:repeat(5,1fr);gap:7px}.keyb{font-size:17px}
    .homo{font-size:18px;gap:7px}.lockbox{min-width:54px;padding:8px 10px}.lockbox .lbn{font-size:19px}
    .cblock{flex-basis:calc(50% - 5px);min-width:0}
    .idcard{flex-basis:100%}
    .mnode{padding:6px 7px;font-size:10.5px}
    .modal .top{padding:22px 20px 16px}.modal .body{padding:8px 20px 22px}
    .modal h3{font-size:21px}.modal .lead{font-size:14px}
    .reason .rt{font-size:15px}.reason .rp{font-size:13.5px}
    .closebtn{top:18px;right:18px}
    footer{margin-top:30px}
    /* 토글 컴팩트 + 단어 단위 줄바꿈 */
    .langtoggle{position:static;margin:0 auto 8px;width:max-content;justify-content:center;font-size:12.5px}
    .langtoggle button{padding:6px 14px}
    .leveltoggle{top:8px;font-size:12px;padding:3px 4px 3px 9px}
    .leveltoggle button{padding:6px 9px}.leveltoggle .lvlbl{font-size:11px}
  }
  header h1,.h h2,.modal h3,header p,.feat-lead,.pillar .pd,.stat .lbl{word-break:keep-all}
</style>
</head>
<body>

<div class="langtoggle">
  <button id="btn-ko" onclick="setLang('ko')">한국어</button>
  <button id="btn-en" onclick="setLang('en')">EN</button>
</div>

<div class="leveltoggle">
  <span class="lvlbl" data-i18n="lvl.label"></span>
  <button id="lvl-0" onclick="setLevel(0)" data-i18n="lvl.0"></button>
  <button id="lvl-1" onclick="setLevel(1)" data-i18n="lvl.1"></button>
  <button id="lvl-2" onclick="setLevel(2)" data-i18n="lvl.2"></button>
</div>

<div class="wrap">
  <!-- HEADER -->
  <header class="reveal">
    <div class="kicker" data-i18n="hdr.kicker"></div>
    <h1 data-i18n="hdr.h1"></h1>
    <p data-i18n="hdr.p"></p>
    <div class="tip" data-i18n="hdr.tip"></div>
    <div class="pillars">
      <button class="pillar reveal" data-key="secret"><div class="pe">🤫</div><div class="pt" data-i18n="pillar.secret.t"></div><div class="pd" data-i18n="pillar.secret.d"></div><div class="more" data-i18n="pillar.more"></div></button>
      <button class="pillar reveal" data-key="verify"><div class="pe">🔍</div><div class="pt" data-i18n="pillar.verify.t"></div><div class="pd" data-i18n="pillar.verify.d"></div><div class="more" data-i18n="pillar.more"></div></button>
      <button class="pillar reveal" data-key="tamper"><div class="pe">🛡️</div><div class="pt" data-i18n="pillar.tamper.t"></div><div class="pd" data-i18n="pillar.tamper.d"></div><div class="more" data-i18n="pillar.more"></div></button>
      <button class="pillar reveal" data-key="watch"><div class="pe">🌍</div><div class="pt" data-i18n="pillar.watch.t"></div><div class="pd" data-i18n="pillar.watch.d"></div><div class="more" data-i18n="pillar.more"></div></button>
    </div>
  </header>

  <!-- STATS -->
  <section>
    <div class="h reveal"><h2 data-i18n="sec.stat.h"></h2><span data-i18n="sec.stat.s"></span></div>
    <div class="grid g4">
      <div class="card stat reveal" data-key="stat-total"><div class="ic">🎫</div><div class="num" id="s-total">320</div><div class="lbl" data-i18n="stat.total"></div><div class="hint" data-i18n="stat.tap"></div></div>
      <div class="card stat reveal" data-key="stat-cast"><div class="ic">📥</div><div class="num" id="s-cast">0</div><div class="lbl" data-i18n="stat.cast"></div><div class="hint" data-i18n="stat.tap"></div></div>
      <div class="card stat reveal" data-key="stat-block"><div class="ic">🧱</div><div class="num" id="s-block">0</div><div class="lbl" data-i18n="stat.block"></div><div class="hint" data-i18n="stat.tap"></div></div>
      <div class="card stat reveal" data-key="stat-verify"><div class="ic">✅</div><div class="num">100%</div><div class="lbl" data-i18n="stat.verify"></div><div class="hint" data-i18n="stat.tap"></div></div>
    </div>
  </section>

  <!-- FLOW -->
  <section>
    <div class="h reveal"><h2 data-i18n="sec.flow.h"></h2><span data-i18n="sec.flow.s"></span></div>
    <div class="flow">
      <div class="step reveal" data-key="step1"><div class="n">1</div><div class="e">🙋</div><div class="t" data-i18n="step1.t"></div><div class="d" data-i18n="step1.d"></div><div class="tap" data-i18n="flow.tap"></div></div>
      <div class="step reveal" data-key="step2"><div class="n">2</div><div class="e">🎫</div><div class="t" data-i18n="step2.t"></div><div class="d" data-i18n="step2.d"></div><div class="tap" data-i18n="flow.tap"></div></div>
      <div class="step reveal" data-key="step3"><div class="n">3</div><div class="e">🔒</div><div class="t" data-i18n="step3.t"></div><div class="d" data-i18n="step3.d"></div><div class="tap" data-i18n="flow.tap"></div></div>
      <div class="step reveal" data-key="step4"><div class="n">4</div><div class="e">🧮</div><div class="t" data-i18n="step4.t"></div><div class="d" data-i18n="step4.d"></div><div class="tap" data-i18n="flow.tap"></div></div>
      <div class="step reveal" data-key="step5"><div class="n">5</div><div class="e">🔍</div><div class="t" data-i18n="step5.t"></div><div class="d" data-i18n="step5.d"></div><div class="tap" data-i18n="flow.tap"></div></div>
    </div>
  </section>

  <!-- SIMULATOR -->
  <section>
    <div class="h reveal"><h2 data-i18n="sec.sim.h"></h2><span data-i18n="sec.sim.s"></span></div>
    <div class="card reveal">
      <div class="sim">
        <div class="votebox">
          <button class="candidate" data-cand="0"><span class="ce">🍎</span><span><span class="cn" data-i18n="cand.0"></span><br><span class="cc" data-i18n="cand.0.d"></span></span><span class="cv" id="cv0">0</span></button>
          <button class="candidate" data-cand="1"><span class="ce">🍊</span><span><span class="cn" data-i18n="cand.1"></span><br><span class="cc" data-i18n="cand.1.d"></span></span><span class="cv" id="cv1">0</span></button>
          <button class="candidate" data-cand="2"><span class="ce">🍇</span><span><span class="cn" data-i18n="cand.2"></span><br><span class="cc" data-i18n="cand.2.d"></span></span><span class="cv" id="cv2">0</span></button>
          <div class="simctrl"><button class="btn btn-reset" id="resetBtn" data-i18n="sim.reset"></button></div>
          <div class="simnote" data-i18n="sim.note"></div>
        </div>
        <div class="procpanel">
          <div class="proctitle" data-i18n="proc.title"></div>
          <ol class="proc" id="proc">
            <li class="pstep"><div class="ps-dot">🙋</div><div class="ps-body"><div class="ps-t" data-i18n="proc.s0"></div><div class="ps-v"></div></div><div class="ps-check">✓</div></li>
            <li class="pstep"><div class="ps-dot">🎫</div><div class="ps-body"><div class="ps-t" data-i18n="proc.s1"></div><div class="ps-v"></div></div><div class="ps-check">✓</div></li>
            <li class="pstep"><div class="ps-dot">🔒</div><div class="ps-body"><div class="ps-t" data-i18n="proc.s2"></div><div class="ps-v"></div></div><div class="ps-check">✓</div></li>
            <li class="pstep"><div class="ps-dot">🧱</div><div class="ps-body"><div class="ps-t" data-i18n="proc.s3"></div><div class="ps-v"></div></div><div class="ps-check">✓</div></li>
            <li class="pstep"><div class="ps-dot">✅</div><div class="ps-body"><div class="ps-t" data-i18n="proc.s4"></div><div class="ps-v"></div></div><div class="ps-check">✓</div></li>
          </ol>
          <div class="ballotchip">
            <div class="bl" data-i18n="sim.ballot.label"></div>
            <div class="bn" id="ballotNum">#----</div>
            <div class="bs" id="ballotState" data-i18n="sim.ballot.idle"></div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- CHARTS -->
  <section>
    <div class="grid g2">
      <div class="card reveal"><div class="h" style="margin-bottom:8px"><h2 style="font-size:20px" data-i18n="chart.bar.h"></h2></div>
        <p style="color:var(--ink2);font-size:13.5px;margin-bottom:14px;font-weight:500" data-i18n="chart.bar.d"></p>
        <canvas id="barChart" height="180"></canvas></div>
      <div class="card reveal"><div class="h" style="margin-bottom:8px"><h2 style="font-size:20px" data-i18n="chart.pie.h"></h2></div>
        <p style="color:var(--ink2);font-size:13.5px;margin-bottom:14px;font-weight:500" data-i18n="chart.pie.d"></p>
        <canvas id="pieChart" height="180"></canvas></div>
    </div>
  </section>

  <!-- LEDGER -->
  <section>
    <div class="h reveal"><h2 data-i18n="sec.ledger.h"></h2><span data-i18n="sec.ledger.s"></span></div>
    <div class="card reveal">
      <table>
        <thead><tr><th data-i18n="th.block"></th><th data-i18n="th.ballot"></th><th data-i18n="th.content"></th><th data-i18n="th.hash"></th><th data-i18n="th.status"></th></tr></thead>
        <tbody id="ledgerBody"></tbody>
      </table>
      <div class="legend">
        <span class="pill pl-secret" data-i18n="ledger.legend.secret"></span>
        <span class="pill pl-ok" data-i18n="ledger.legend.verify"></span>
      </div>
    </div>
  </section>

  <!-- CONCEPTS + COMPARE -->
  <section>
    <div class="grid g2">
      <div class="card reveal"><div class="h" style="margin-bottom:8px"><h2 style="font-size:20px" data-i18n="sec.magic.h"></h2></div>
        <p style="color:var(--ink2);font-size:13.5px;margin-bottom:14px;font-weight:500" data-i18n="sec.magic.s"></p>
        <div class="concept" data-key="enc"><div class="em">🔒</div><div><b data-i18n="magic.enc.t"></b><p data-i18n="magic.enc.d"></p></div><div class="go">›</div></div>
        <div class="concept" data-key="zkp"><div class="em">🎁</div><div><b data-i18n="magic.zkp.t"></b><p data-i18n="magic.zkp.d"></p></div><div class="go">›</div></div>
        <div class="concept" data-key="anon"><div class="em">🏷️</div><div><b data-i18n="magic.anon.t"></b><p data-i18n="magic.anon.d"></p></div><div class="go">›</div></div>
      </div>
      <div class="card reveal"><div class="h" style="margin-bottom:8px"><h2 style="font-size:20px" data-i18n="sec.comp.h"></h2></div>
        <p style="color:var(--ink2);font-size:13.5px;margin-bottom:14px;font-weight:500" data-i18n="sec.comp.s"></p>
        <div class="comp">
          <div class="box bad"><h3 data-i18n="comp.old.h"></h3><ul>
            <li data-i18n="comp.old.1"></li><li data-i18n="comp.old.2"></li><li data-i18n="comp.old.3"></li><li data-i18n="comp.old.4"></li></ul></div>
          <div class="box good"><h3 data-i18n="comp.new.h"></h3><ul>
            <li data-i18n="comp.new.1"></li><li data-i18n="comp.new.2"></li><li data-i18n="comp.new.3"></li><li data-i18n="comp.new.4"></li></ul></div>
        </div>
      </div>
    </div>
  </section>

  <!-- ===================== v3.0 INTERACTIVE LAB ===================== -->
  <section>
    <div class="h reveal"><h2 data-i18n="v3.lab.h"></h2><span data-i18n="v3.lab.s"></span></div>
  </section>

  <!-- 1. 위변조 공격 -->
  <section><div class="h reveal"><h2 style="font-size:21px" data-i18n="v3.tamper.h"></h2></div>
    <div class="card reveal">
      <div class="feat-lead" data-i18n="v3.tamper.lead"></div>
      <div class="chain" id="tchain"></div>
      <div class="verdict ok" id="tverdict"></div>
      <div class="wbtns"><button class="btn btn-go" id="tBtn" data-i18n="v3.tamper.btn"></button><button class="btn btn-ghost" id="tReset" data-i18n="v3.reset"></button></div>
      <div class="depthnote" data-lv="v3.tamper.depth"></div>
    </div></section>

  <!-- 2. 임계 개표 9-of-15 -->
  <section><div class="h reveal"><h2 style="font-size:21px" data-i18n="v3.thr.h"></h2></div>
    <div class="card reveal">
      <div class="feat-lead" data-i18n="v3.thr.lead"></div>
      <div class="keys" id="keys"></div>
      <div class="vault" id="vault"><div class="ve" id="vaultE">🔒</div><div class="vt" id="vaultT"></div></div>
      <div class="wbtns"><button class="btn btn-ghost" id="thrReset" data-i18n="v3.reset"></button></div>
      <div class="depthnote" data-lv="v3.thr.depth"></div>
    </div></section>

  <!-- 3. 동형암호 -->
  <section><div class="h reveal"><h2 style="font-size:21px" data-i18n="v3.homo.h"></h2></div>
    <div class="card reveal">
      <div class="feat-lead" data-i18n="v3.homo.lead"></div>
      <div class="homo" id="homo"></div>
      <div class="wbtns"><button class="btn btn-go" id="homoAdd" data-i18n="v3.homo.add"></button><button class="btn btn-go" id="homoReveal" data-i18n="v3.homo.reveal"></button><button class="btn btn-ghost" id="homoReset" data-i18n="v3.reset"></button></div>
      <div class="depthnote" data-lv="v3.homo.depth"></div>
    </div></section>

  <!-- 4. 무효화자 -->
  <section><div class="h reveal"><h2 style="font-size:21px" data-i18n="v3.null.h"></h2></div>
    <div class="card reveal">
      <div class="feat-lead" data-i18n="v3.null.lead"></div>
      <div class="idrow">
        <div class="idcard"><b data-i18n="v3.null.voterA"></b><div class="stamp" id="stampA">—</div><div class="res" id="resA"></div>
          <div class="wbtns"><button class="btn btn-go" data-null="0" data-i18n="v3.null.vote"></button></div></div>
        <div class="idcard"><b data-i18n="v3.null.voterB"></b><div class="stamp" id="stampB">—</div><div class="res" id="resB"></div>
          <div class="wbtns"><button class="btn btn-go" data-null="1" data-i18n="v3.null.vote"></button></div></div>
      </div>
      <div class="wbtns"><button class="btn btn-ghost" id="nullReset" data-i18n="v3.reset"></button></div>
      <div class="depthnote" data-lv="v3.null.depth"></div>
    </div></section>

  <!-- 5. 종료 전 봉쇄 타이머 -->
  <section><div class="h reveal"><h2 style="font-size:21px" data-i18n="v3.lock.h"></h2></div>
    <div class="card reveal">
      <div class="feat-lead" data-i18n="v3.lock.lead"></div>
      <div style="text-align:center;padding:8px">
        <div style="font-size:48px" id="lockE">🔒</div>
        <div style="font-weight:800;font-size:22px;margin-top:4px" id="lockResult"></div>
        <div style="color:var(--ink2);font-weight:700;margin-top:6px" id="lockTimer"></div>
      </div>
      <div class="wbtns" style="justify-content:center"><button class="btn btn-go" id="lockSkip" data-i18n="v3.lock.skip"></button><button class="btn btn-ghost" id="lockReset" data-i18n="v3.reset"></button></div>
      <div class="depthnote" data-lv="v3.lock.depth"></div>
    </div></section>

  <!-- 6. 매표 방어 -->
  <section><div class="h reveal"><h2 style="font-size:21px" data-i18n="v3.bribe.h"></h2></div>
    <div class="card reveal">
      <div class="feat-lead" data-i18n="v3.bribe.lead"></div>
      <div style="font-weight:700;background:#ffdada;border:1px solid #ffb0a8;border-radius:12px;padding:12px;color:#a02a22" data-i18n="v3.bribe.demand"></div>
      <div class="wbtns" id="bribeBtns"></div>
      <div class="verdict bad" id="bribeRes" style="display:none"></div>
      <div class="depthnote" data-lv="v3.bribe.depth"></div>
    </div></section>

  <!-- 7. 머클트리 -->
  <section><div class="h reveal"><h2 style="font-size:21px" data-i18n="v3.merkle.h"></h2></div>
    <div class="card reveal">
      <div class="feat-lead" data-i18n="v3.merkle.lead"></div>
      <div class="merkle" id="merkle"></div>
      <div class="res" id="merkleRes" style="font-weight:700;text-align:center;margin-top:12px;min-height:22px"></div>
      <div class="depthnote" data-lv="v3.merkle.depth"></div>
    </div></section>

  <!-- 8. 직접 검증 -->
  <section><div class="h reveal"><h2 style="font-size:21px" data-i18n="v3.verify.h"></h2></div>
    <div class="card reveal">
      <div class="feat-lead" data-i18n="v3.verify.lead"></div>
      <div class="checks" id="checks"></div>
      <div class="verdict ok" id="verifyRes" style="display:none"></div>
      <div class="wbtns"><button class="btn btn-go" id="verifyRun" data-i18n="v3.verify.run"></button><button class="btn btn-ghost" id="verifyReset" data-i18n="v3.reset"></button></div>
      <div class="depthnote" data-lv="v3.verify.depth"></div>
    </div></section>

  <!-- 10. 온체인/오프체인 -->
  <section><div class="h reveal"><h2 style="font-size:21px" data-i18n="v3.oo.h"></h2></div>
    <div class="card reveal">
      <div class="feat-lead" data-i18n="v3.oo.lead"></div>
      <div class="oo">
        <div class="oobox" id="ooOff"><h4 data-i18n="v3.oo.off.h"></h4><p data-i18n="v3.oo.off.p"></p><div id="ooOffState" style="font-weight:800;margin-top:8px"></div></div>
        <div class="ooarrow">→<br><span style="font-size:11px" data-i18n="v3.oo.arrow"></span></div>
        <div class="oobox" id="ooOn"><h4 data-i18n="v3.oo.on.h"></h4><p data-i18n="v3.oo.on.p"></p><div id="ooOnState" style="font-weight:800;margin-top:8px"></div></div>
      </div>
      <div class="wbtns"><button class="btn btn-go" id="ooTamper" data-i18n="v3.oo.btn"></button><button class="btn btn-ghost" id="ooReset" data-i18n="v3.reset"></button></div>
      <div class="depthnote" data-lv="v3.oo.depth"></div>
    </div></section>

  <footer>
    <div data-i18n="footer"></div>
    <div class="credit" data-i18n="credit"></div>
  </footer>
</div>

<!-- MODAL -->

/* ===================== 상태 & 렌더 ===================== */
let lang = (window.__LANG__==='en'||window.__LANG__==='ko') ? window.__LANG__
         : (document.cookie.match(/(?:^|;\s*)lang=(ko|en)/)?.[1])
         || ((navigator.language||'').toLowerCase().startsWith('ko')?'ko':'en');

const CANDS=[{e:'🍎',col:'#ff4d8d'},{e:'🍊',col:'#ff8a1e'},{e:'🍇',col:'#7c4dff'}];
const TOTAL_BALLOTS=320, INVALID=0;
let votes, blockCount, ledger, prevHash;
// 실제 투표처럼 0표에서 시작 — 결과는 오직 사용자의 클릭으로 결정돼요(매번 다름)
function seed(){votes=[0,0,0];blockCount=0;ledger=[];prevHash='0000';}
seed();

function T(k){return (DICT[lang]&&DICT[lang][k])||(DICT.ko[k])||'';}
function castTotal(){return votes[0]+votes[1]+votes[2];}

function render(){
  document.documentElement.lang=lang;
  document.title=T('doc.title');
  document.querySelectorAll('[data-i18n]').forEach(el=>{el.innerHTML=T(el.dataset.i18n);});
  document.getElementById('btn-ko').classList.toggle('act',lang==='ko');
  document.getElementById('btn-en').classList.toggle('act',lang==='en');
  renderStats();renderLedger();applyChartLang();
}
function renderStats(){
  document.getElementById('s-total').textContent=TOTAL_BALLOTS;
  document.getElementById('s-cast').textContent=castTotal();
  document.getElementById('s-block').textContent=blockCount;
  for(let i=0;i<3;i++)document.getElementById('cv'+i).textContent=votes[i];
}
function renderLedger(){
  const tb=document.getElementById('ledgerBody');
  if(ledger.length===0){
    tb.innerHTML=`<tr><td colspan="5" style="text-align:center;color:var(--ink2);font-weight:600;padding:22px">${T('ledger.empty')}</td></tr>`;
    return;
  }
  tb.innerHTML=ledger.slice(0,6).map(r=>`<tr data-key="ledger"><td>#${String(r.b).padStart(3,'0')}</td>
    <td class="mono">${r.tag}…</td><td><span class="pill pl-lock">${T('tbl.lock')}</span></td>
    <td class="mono">${r.h}…</td><td><span class="pill pl-ok">${T('tbl.ok')}</span></td></tr>`).join('');
  tb.querySelectorAll('[data-key]').forEach(el=>el.addEventListener('click',()=>openModal('ledger')));
  const nr=tb.querySelector('tr');if(nr&&ledger._new){nr.classList.add('new');ledger._new=false;}
}

/* ===== 언어 전환 =====
   배포 환경(/ko·/en URL)에서는 해당 주소로 이동해 공유·OG가 언어별로 일치하게,
   로컬 파일(file://)에서는 새로고침 없이 클라이언트 전환. */
function setLang(l){
  document.cookie='lang='+l+';path=/;max-age=31536000';
  const p=location.pathname.replace(/\/+$/,'');
  if(p==='/ko'||p==='/en'){ if(p!=='/'+l) location.pathname='/'+l; return; }
  lang=l;render();
}

/* ===== 모달 ===== */
const overlay=document.getElementById('overlay');
function openModal(key){
  const d=MODAL[lang]&&MODAL[lang][key]||MODAL.ko[key];if(!d)return;
  const col=COLOR[d.c]||COLOR.ink;
  const tag=document.getElementById('mTag');tag.textContent=d.tag;tag.style.color=col;
  document.getElementById('mTitle').textContent=d.title;
  document.getElementById('mLead').textContent=d.lead;
  document.getElementById('mBody').innerHTML=d.reasons.map((r,i)=>`<div class="reason">
    <div class="rn" style="background:${col}">${i+1}</div><div><div class="rt">${r.t}</div>
    <div class="rp">${r.p}</div>${r.ex?`<div class="ex">💡 ${r.ex}</div>`:''}</div></div>`).join('');
  overlay.classList.add('on');document.body.style.overflow='hidden';
}
function closeModal(){overlay.classList.remove('on');document.body.style.overflow='';}
document.querySelectorAll('[data-key]').forEach(el=>{if(el.dataset.key!=='ledger')el.addEventListener('click',()=>openModal(el.dataset.key));});
document.getElementById('closeBtn').addEventListener('click',closeModal);
overlay.addEventListener('click',e=>{if(e.target===overlay)closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

/* ===== 투표 시뮬 ===== */
function rndHex(n){let s='';const h='0123456789abcdef';for(let i=0;i<n;i++)s+=h[Math.floor(Math.random()*16)];return s;}
function rndTag(){let s='#';const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';for(let i=0;i<4;i++)s+=c[Math.floor(Math.random()*c.length)];return s;}
let toastTimer;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('on'),2600);}
function confetti(x,y){const em=['🎉','✨','🗳️','🔒','⛓️','🍎','🍊','🍇'];
  for(let i=0;i<14;i++){const s=document.createElement('div');s.className='confetti';
    s.textContent=em[Math.floor(Math.random()*em.length)];s.style.left=x+'px';s.style.top=y+'px';
    s.style.setProperty('--tx',(Math.random()*220-110)+'px');
    s.style.setProperty('--ty',(Math.random()*-180-40)+'px');
    s.style.setProperty('--r',(Math.random()*540-270)+'deg');
    document.body.appendChild(s);setTimeout(()=>s.remove(),950);}}
function vote(i,ev){
  if(castTotal()>=TOTAL_BALLOTS){toast(T('sim.toast.full'));return;}
  votes[i]++;blockCount++;
  const tag=rndTag();
  // 새 블록의 "이전 블록 도장"은 직전 블록의 해시 → 사슬처럼 연결
  ledger.unshift({b:blockCount,tag:tag,h:prevHash});
  prevHash=rndHex(4);
  ledger._new=true;
  const bc=document.getElementById('ballotNum');bc.textContent=tag;
  document.getElementById('ballotState').textContent=T('sim.ballot.done').replace('{n}',blockCount);
  renderStats();renderLedger();updateCharts();
  runProcess(i,tag,blockCount);
  toast(T('sim.toast').replace('{n}',blockCount));
  if(ev){const r=ev.currentTarget.getBoundingClientRect();confetti(r.right-30,r.top+r.height/2);}
}
/* 표 한 장의 전 과정을 단계별로 펼쳐 보여줌 */
let procTimers=[];
function clearProcess(){
  procTimers.forEach(clearTimeout);procTimers=[];
  document.querySelectorAll('#proc .pstep').forEach(s=>{s.classList.remove('active','done');
    const v=s.querySelector('.ps-v');if(v)v.textContent='';});
}
function runProcess(ci,tag,block){
  clearProcess();
  const cand=T('cand.'+ci);
  const vals=[T('proc.v0'),
    T('proc.v1').replace('{tag}',tag),
    T('proc.v2').replace('{c}',cand),
    T('proc.v3').replace('{n}',block),
    T('proc.v4')];
  const steps=[...document.querySelectorAll('#proc .pstep')];
  const gap=440;
  steps.forEach((s,k)=>{
    procTimers.push(setTimeout(()=>{
      s.classList.add('active');
      const v=s.querySelector('.ps-v');if(v)v.textContent=vals[k];
    },120+k*gap));
    procTimers.push(setTimeout(()=>{s.classList.add('done');s.classList.remove('active');},120+k*gap+330));
  });
}
document.querySelectorAll('.candidate').forEach(b=>b.addEventListener('click',e=>vote(+b.dataset.cand,e)));
document.getElementById('resetBtn').addEventListener('click',()=>{
  seed();clearProcess();
  document.getElementById('ballotNum').textContent='#----';
  document.getElementById('ballotState').textContent=T('sim.ballot.idle');
  renderStats();renderLedger();updateCharts();
});

/* ===== 차트 ===== */
Chart.defaults.color='#8a6f57';Chart.defaults.font.family="'Pretendard',sans-serif";Chart.defaults.font.weight='600';
let barChart,pieChart;
function buildCharts(){
  barChart=new Chart(document.getElementById('barChart'),{type:'bar',
    data:{labels:[],datasets:[{data:[...votes,INVALID],backgroundColor:['#ff4d8d','#ff8a1e','#7c4dff','#d8c4b0'],borderRadius:10,barThickness:46}]},
    options:{plugins:{legend:{display:false}},animation:{duration:500},
      scales:{y:{grid:{color:'#ffe0bd'},ticks:{stepSize:30}},x:{grid:{display:false},ticks:{font:{size:13,weight:'700'}}}}}});
  pieChart=new Chart(document.getElementById('pieChart'),{type:'doughnut',
    data:{labels:[],datasets:[{data:[castTotal(),TOTAL_BALLOTS-castTotal()],backgroundColor:['#10b8a6','#ffce8a'],borderWidth:0,cutout:'64%'}]},
    options:{plugins:{legend:{position:'bottom',labels:{font:{size:13,weight:'700'},padding:16,usePointStyle:true,pointStyle:'circle'}}}}});
}
function updateCharts(){
  barChart.data.datasets[0].data=[...votes,INVALID];barChart.update();
  pieChart.data.datasets[0].data=[castTotal(),TOTAL_BALLOTS-castTotal()];pieChart.update();
}
function applyChartLang(){
  if(!barChart)return;
  barChart.data.labels=[T('cand.0'),T('cand.1'),T('cand.2'),T('chart.invalid')];barChart.update();
  pieChart.data.labels=[T('chart.voted'),T('chart.notyet')];pieChart.update();
}

/* ===== 등장 애니메이션 ===== */
function initReveal(){
  const els=[...document.querySelectorAll('.reveal')];
  const io=new IntersectionObserver((ents)=>{ents.forEach(e=>{if(e.isIntersecting){
    e.target.style.transitionDelay=(Math.min([...e.target.parentNode.children].indexOf(e.target),5)*0.07)+'s';
    e.target.classList.add('in');io.unobserve(e.target);}});},{threshold:.12});
  els.forEach(el=>io.observe(el));
}

/* ===== 시작 ===== */
buildCharts();render();initReveal();
</script>

 'v3.lock.depth':['종료 전엔 결과가 ??? 로 잠겨 있어요. "초반 결과 보고 따라 찍기"를 막기 위해서예요.','개표 키를 종료 시각 전엔 모으지 않기로 위원들이 약속하거나, 시간이 지나야 풀리는 잠금을 써요.','시간잠금 암호(time-lock)나 위원 비공개 합의로 종료 전 부분개표를 원천 차단해, 중간 추세 유출에 의한 투표 편승(bandwagon)을 막습니다.'],
 'v3.bribe.depth':['내가 무엇을 찍었는지 남에게 보여줄 "증거"를 못 만들게 설계해요. 증거가 없으니 협박·매수가 소용없어요.','영수증 없는(receipt-free) 설계: 투표 후 어떤 산출물도 "이 후보를 찍었다"를 제3자에게 입증하지 못해요.','강제저항(coercion-resistance). MACI처럼 조정자에게 키를 바꿔 이전 표를 무효화·재투표할 수 있게 하면, 강요자가 본 "증거"가 사후에 뒤집혀 매표가 무의미해집니다.'],
 'v3.merkle.depth':['모두를 둘씩 묶고 또 묶어 맨 위 "뿌리" 하나만 공개해요. 내 칸에서 뿌리까지 길만 보이면 명부에 있다는 게 증명돼요.','해시를 쌍쌍이 합쳐 올라가는 머클트리. 잎에서 루트까지 형제 해시 몇 개(=경로)만 있으면 멤버십을 검증할 수 있어요.','멤버십 증명 크기가 O(log n) — 4,400만 명도 약 26단계면 충분. 루트만 온체인에 올리고, 영지식증명으로 경로 노출 없이 "루트에 속함"을 증명합니다.'],
 'v3.verify.depth':['결과가 맞는지 누구나 스스로 확인할 수 있어요. 누군가를 믿을 필요가 없어요.','검증에 필요한 코드와 회로가 전부 공개돼, 전문가·언론·시민 누구나 같은 검사를 재현할 수 있어요.','공개 검증성: 모든 영지식증명·동형합산·임계복호화 증명을 외부 도구가 독립 재검증하며, 검증에 어떤 비밀도 필요 없습니다.'],
 'v3.oo.depth':['무거운 원본은 따로 두고 작은 "지문"만 공개해요. 원본을 몰래 바꾸면 지문이 안 맞아 바로 들켜요.','원본의 해시(지문)만 체인에 올려요. 데이터 가용성은 별도 계층이 맡고, 무결성은 온체인 해시가 보장해요.','온체인은 명부 루트·무효화자 집합·집계 앵커 등 "무결성 앵커"만 저장. 오프체인 가용성 계층이 원본을 복제·공증하고 온체인 해시와 대조해 위변조를 탐지합니다.']
},en:{
 'v3.tamper.depth':['Change one box and the stamps behind it stop matching in a row — caught instantly.','Each block holds a hash of the previous block. Change the content and the hash changes completely, clashing with the next block’s stored value.','Hashes are one-way and collision-resistant, so altering content while keeping the same hash is computationally infeasible — plus distributed consensus means you’d have to forge the chain on many nodes at once.'],
 'v3.thr.depth':['Too few and a clique could collude; too many and the count stalls if some drop out. 9 is the balance.','It uses t-of-n secret sharing: the secret splits into 15 pieces but any 9 reconstruct it — 8 pieces leak nothing.','Shamir secret sharing: share n points on a degree-t polynomial; only t+1 points recover the constant (secret). 9-of-15 balances collusion-resistance (≤8 powerless) and availability (≤6 loss tolerated).'],
 'v3.homo.depth':['Like 🔒3 + 🔒5 = 🔒8 — adding locked boxes yields a locked sum. Only that sum is opened.','It’s additively-homomorphic encryption that preserves addition: operating on ciphertexts equals adding the plaintexts.','Additively-homomorphic schemes like exponential ElGamal/Paillier: E(a)·E(b)=E(a+b), so sealed votes combine into the tally and only the total is opened via threshold decryption.'],
 'v3.null.depth':['One stamp per person. A second stamp looks identical and is caught at once — yet no name is written.','Nullifier = hash(personal secret, election ID). Same person + same election → same value (catches repeats), but being a hash it can’t be reversed to an identity.','Semaphore-style nullifier = Hash(identitySecret, externalNullifier). A ZK proof shows “member of the roll + correct nullifier” without revealing identity; the board only enforces nullifier-set uniqueness.'],
 'v3.lock.depth':['Before close, the result stays locked as ??? to stop “follow the early lead” voting.','Trustees agree not to gather the key before close, or use a lock that only releases after a set time.','Time-lock cryptography or private trustee agreement blocks any partial count before close, preventing bandwagon effects from leaked early trends.'],
 'v3.bribe.depth':['It’s designed so you can’t produce any “evidence” of how you voted — no evidence, so coercion and bribery don’t work.','Receipt-free design: after voting, no artifact can prove to a third party “I voted for this candidate.”','Coercion-resistance. Like MACI, a coordinator key-swap lets you nullify/re-cast a prior vote, so any “evidence” the coercer saw can be overturned later — making vote-buying pointless.'],
 'v3.merkle.depth':['Pair everyone up and up again until one “root” at the top is public. Show only the path from your slot to the root to prove you’re on the roll.','A Merkle tree hashing pairs upward. From a leaf to the root, just a few sibling hashes (the path) verify membership.','Membership proofs are O(log n) — even 44M voters need ~26 steps. Only the root goes on-chain, and a ZK proof shows “belongs to root” without revealing the path.'],
 'v3.verify.depth':['Anyone can check the result themselves — no need to trust anyone.','All verification code and circuits are public, so experts, press and citizens can reproduce the same checks.','Public verifiability: every ZK proof, homomorphic sum and threshold-decryption proof is independently re-checked by outside tools, needing no secret at all.'],
 'v3.oo.depth':['Keep bulky originals aside and publish only tiny “fingerprints.” Secretly change an original and its fingerprint won’t match — caught instantly.','Only the original’s hash (fingerprint) goes on-chain. A separate layer handles availability; on-chain hashes guarantee integrity.','On-chain stores only “integrity anchors” — roll root, nullifier set, tally anchor. An off-chain availability layer replicates/notarizes originals and detects tampering by comparing to on-chain hashes.']
}};
function pickLv(k){const a=(LV[lang]&&LV[lang][k])||LV.ko[k]||['','',''];return a[level]!==undefined?a[level]:a[0];}

/* ---------- 모달 심화(레벨>0에서 추가) : 4대 보장 ---------- */

 verify:{1:[['공개 게시판 + 영구 기록','모든 봉인표·증명이 변경 불가하게 남아 누구나 재계산할 수 있어요.']],2:[['공개 검증성','영지식증명·동형합산·임계복호화 증명을 외부 도구가 운영자 비밀 없이 독립 검증합니다.']]},
 tamper:{1:[['해시 사슬','각 블록이 앞 블록 해시를 담아, 한 곳만 바꿔도 이후가 전부 어긋나요.']],2:[['단방향 해시 + 분산 합의','충돌저항 해시로 같은 해시 유지 위조가 불가하고, 다수 노드 사슬을 동시에 바꿔야 해 현실적으로 불가합니다.']]},
 watch:{1:[['분산 + 합의','장부를 다수가 복제·검사하고, 다수 동의로만 기록이 추가돼요.']],2:[['신뢰의 분산(9-of-15)','단일 기관이 결과를 열거나 바꿀 수 없게 키와 권한을 다수 기관에 분산합니다.']]}
},en:{
 secret:{1:[['ZK proves "rules without content"','It proves roll-membership + single-vote without revealing identity or choice — blocking fraud while keeping secrecy.']],2:[['Additive homomorphism + anonymous membership','Sealed votes are encrypted to allow only summation, and a Semaphore-style anonymity set mathematically separates identity from vote.']]},
 verify:{1:[['Public board + permanent record','Every sealed vote and proof remains immutable, so anyone can recompute.']],2:[['Public verifiability','ZK proofs, homomorphic sums and threshold-decryption proofs are independently verified by outside tools without operator secrets.']]},
 tamper:{1:[['Hash chain','Each block carries the previous hash, so one change makes everything after it clash.']],2:[['One-way hash + distributed consensus','Collision-resistant hashing makes same-hash forgery impossible, and you’d have to change many nodes’ chains at once.']]},
 watch:{1:[['Distribution + consensus','Many parties replicate and check the ledger, and records are added only by majority agreement.']],2:[['Distributed trust (9-of-15)','Keys and authority are split among many institutions so no single one can open or change the result.']]}
}};

/* ---------- 레벨 상태 ---------- */
let level=(function(){const m=document.cookie.match(/(?:^|;\s*)lvl=([012])/);return m?+m[1]:0;})();
function applyLevel(){
  document.querySelectorAll('[data-lv]').forEach(el=>{el.textContent=pickLv(el.dataset.lv);});
  [0,1,2].forEach(i=>{const b=$('lvl-'+i);if(b)b.classList.toggle('act',i===level);});
  document.body.dataset.level=level;
}
window.setLevel=function(l){level=l;document.cookie='lvl='+l+';path=/;max-age=31536000';applyLevel();paintAll();
  const ov=$('overlay');if(ov&&ov.classList.contains('on')&&curModalKey)openModal(curModalKey);};

/* ---------- 모달 패치(심화 추가) ---------- */
let curModalKey=null;
const _openModal=openModal;
openModal=function(k){
  curModalKey=k;_openModal(k);
  if(level>0 && DEEP[lang] && DEEP[lang][k]){
    const body=$('mBody');if(!body)return;
    const wrap=document.createElement('div');
    wrap.style.cssText='margin-top:8px;padding-top:14px;border-top:2px dashed var(--line)';
    let html='<div style="font-weight:800;font-size:14px;color:var(--secret);margin-bottom:8px">🔬 '+(lang==='en'?'Go deeper':'더 깊이')+' ('+pickLv('lvl.'+level)+')</div>';
    for(let t=1;t<=level;t++){const arr=DEEP[lang][k][t];if(!arr)continue;
      arr.forEach(r=>{html+='<div style="margin-bottom:10px"><div style="font-weight:800;font-size:14.5px">'+r[0]+'</div><div style="font-size:13.5px;color:var(--ink2);font-weight:500;margin-top:2px">'+r[1]+'</div></div>';});}
    wrap.innerHTML=html;body.appendChild(wrap);
  }
};

/* ===================== 위젯들 ===================== */
/* 1) 위변조 공격 */
const TVALS=['🍎','🍊','🍇','🍊'];let tHash=TVALS.map(()=>rh(4)),tampered=false;
function paintTamper(){
  const c=$('tchain');if(!c)return;
  c.innerHTML=TVALS.map((v,i)=>{
    const broken=tampered&&i>=1;
    const link=i===0?'⛓️ genesis':(broken?T('v3.tamper.linkbad'):T('v3.tamper.link'));
    return '<div class="cblock'+(broken?' broken':'')+'"><div class="cb-n">#'+(i+1).toString().padStart(3,'0')+'</div><div class="cb-v">'+(tampered&&i===1?'🍇':v)+'</div><div class="cb-h">'+(broken?rh(4):tHash[i])+'…</div><div class="cb-link">'+link+'</div></div>';
  }).join('');
  const vd=$('tverdict');vd.className='verdict '+(tampered?'bad':'ok');vd.textContent=tampered?T('v3.tamper.badv'):T('v3.tamper.okv');
}

/* 2) 임계 개표 */
let keysOn=new Array(15).fill(false);
function paintThr(){
  const k=$('keys');if(!k)return;
  if(k.children.length!==15){k.innerHTML='';for(let i=0;i<15;i++){const b=document.createElement('button');b.className='keyb';b.textContent='🗝️';b.onclick=()=>{keysOn[i]=!keysOn[i];paintThr();};k.appendChild(b);}}
  let n=0;keysOn.forEach((o,i)=>{k.children[i].classList.toggle('on',o);if(o)n++;});
  const open=n>=9,v=$('vault');v.classList.toggle('open',open);
  $('vaultE').textContent=open?'🔓📊':'🔒';
  $('vaultT').textContent=open?T('v3.thr.open').replace('{n}',n):T('v3.thr.locked').replace('{n}',n).replace('{m}',Math.max(0,9-n));
}

/* 3) 동형암호 */
let homoAdds=[3,5],homoReveal=false;
function paintHomo(){
  const h=$('homo');if(!h)return;
  let parts=homoAdds.map(n=>'<div class="lockbox"><div class="lbk">🔒 '+T('v3.homo.vote')+'</div><div class="lbn">🔒'+n+'</div></div>').join('<span>+</span>');
  const sum=homoAdds.reduce((a,b)=>a+b,0);
  parts+='<span>=</span><div class="lockbox '+(homoReveal?'revealed':'sum')+'"><div class="lbk">'+(homoReveal?T('v3.homo.sumk2'):T('v3.homo.sumk'))+'</div><div class="lbn">'+(homoReveal?'✅'+sum:'🔒'+sum)+'</div></div>';
  h.innerHTML=parts;
}

/* 4) 무효화자 */
let nullStamp=[null,null];
function paintNull(){
  $('stampA').textContent=nullStamp[0]||'—';$('stampB').textContent=nullStamp[1]||'—';
}
function nullVote(i){
  const res=$(i===0?'resA':'resB');
  if(nullStamp[i]){res.textContent=T('v3.null.dup');res.style.color='var(--bad)';}
  else{nullStamp[i]='🔏 '+rh(4);res.textContent=T('v3.null.ok')+' · '+T('v3.null.note');res.style.color='var(--good)';paintNull();}
}

/* 5) 종료 전 봉쇄 타이머 */
let lockN=8,lockRevealed=false,lockTimer=null;
function paintLock(){
  $('lockE').textContent=lockRevealed?'🔓':'🔒';
  $('lockResult').textContent=lockRevealed?T('v3.lock.revealed'):T('v3.lock.hidden');
  $('lockTimer').textContent=lockRevealed?T('v3.lock.done'):T('v3.lock.timer').replace('{n}',lockN);
}
function lockStart(){clearInterval(lockTimer);lockN=8;lockRevealed=false;paintLock();
  lockTimer=setInterval(()=>{lockN--;if(lockN<=0){lockN=0;lockRevealed=true;clearInterval(lockTimer);}paintLock();},1000);}

/* 6) 매표 방어 */
let bribeTried=new Set();
function paintBribe(){
  const b=$('bribeBtns');if(!b)return;
  b.innerHTML='';[1,2,3].forEach(n=>{const btn=document.createElement('button');btn.className='btn btn-ghost';btn.textContent=T('v3.bribe.try'+n);
    btn.onclick=()=>{bribeTried.add(n);const r=$('bribeRes');r.style.display='block';r.className='verdict '+(bribeTried.size>=3?'ok':'bad');
      r.textContent=(bribeTried.size>=3?T('v3.bribe.win'):T('v3.bribe.r'+n));};b.appendChild(btn);});
}

/* 7) 머클트리 */
function paintMerkle(){
  const m=$('merkle');if(!m||m.dataset.built)return;m.dataset.built='1';
  const leaves=8;let html='';
  // root, level2(2), level1(4), leaves(8) — 위에서 아래로
  html+='<div class="mrow"><div class="mnode root" data-r="1">'+'■'+'</div></div>';
  html+='<div class="mrow">'+[0,1].map(i=>'<div class="mnode" data-l2="'+i+'">'+rh(3)+'</div>').join('')+'</div>';
  html+='<div class="mrow">'+[0,1,2,3].map(i=>'<div class="mnode" data-l1="'+i+'">'+rh(3)+'</div>').join('')+'</div>';
  html+='<div class="mrow">'+Array.from({length:leaves},(_,i)=>'<div class="mnode leaf" data-leaf="'+i+'">'+(i===2?'🙋':rh(2))+'</div>').join('')+'</div>';
  m.innerHTML=html;
  m.querySelectorAll('.leaf').forEach(el=>el.addEventListener('click',()=>{
    const i=+el.dataset.leaf;m.querySelectorAll('.mnode').forEach(n=>n.classList.remove('path'));
    el.classList.add('path');
    m.querySelector('[data-l1="'+Math.floor(i/2)+'"]').classList.add('path');
    m.querySelector('[data-l2="'+Math.floor(i/4)+'"]').classList.add('path');
    m.querySelector('[data-r="1"]').classList.add('path');
    $('merkleRes').textContent=T('v3.merkle.res');$('merkleRes').style.color='var(--good)';
  }));
}
function paintMerkleText(){const r=$('merkleRes');if(r&&!r.textContent.trim())r.textContent=T('v3.merkle.idle');
  const root=document.querySelector('#merkle [data-r]');if(root)root.textContent='■';}

/* 8) 직접 검증 */
let verifyRun=false;
function buildChecks(){const c=$('checks');if(!c||c.dataset.built)return;c.dataset.built='1';
  for(let i=0;i<4;i++){const d=document.createElement('div');d.className='chk';d.id='chk'+i;
    d.innerHTML='<div class="cbox">✓</div><div class="ct" data-i18n="v3.verify.c'+i+'"></div>';c.appendChild(d);}}
function runVerify(){verifyRun=true;[0,1,2,3].forEach(i=>setTimeout(()=>{$('chk'+i).classList.add('on');

/* ---------- 이벤트 ---------- */
function wire(){
  $('tBtn').onclick=()=>{tampered=true;paintTamper();};
  $('tReset').onclick=()=>{tampered=false;tHash=TVALS.map(()=>rh(4));paintTamper();};
  $('thrReset').onclick=()=>{keysOn=new Array(15).fill(false);paintThr();};
  $('homoAdd').onclick=()=>{if(homoAdds.length<6){homoAdds.push(1+Math.floor(Math.random()*5));homoReveal=false;paintHomo();}};
  $('homoReveal').onclick=()=>{homoReveal=true;paintHomo();};
  $('homoReset').onclick=()=>{homoAdds=[3,5];homoReveal=false;paintHomo();};
  document.querySelectorAll('[data-null]').forEach(b=>b.onclick=()=>nullVote(+b.dataset.null));
  $('nullReset').onclick=()=>{nullStamp=[null,null];$('resA').textContent='';$('resB').textContent='';paintNull();};
  $('lockSkip').onclick=()=>{lockN=0;lockRevealed=true;clearInterval(lockTimer);paintLock();};
  $('lockReset').onclick=()=>lockStart();
  $('verifyRun').onclick=()=>{if(!verifyRun)runVerify();};
  $('verifyReset').onclick=()=>resetVerify();
  $('ooTamper').onclick=()=>{ooForged=true;paintOO();};
  $('ooReset').onclick=()=>{ooForged=false;paintOO();};
}

/* ---------- render 패치 ---------- */
const _render=render;
render=function(){_render();applyLevel();paintAll();
  document.querySelectorAll('#merkle .leaf').forEach(()=>{});};

/* ---------- 시작 ----------
   (새 섹션의 .reveal 등장 애니메이션은 script1의 initReveal 옵저버가 이미 처리함) */
buildChecks();paintMerkle();wire();render();lockStart();
})();
</script>
